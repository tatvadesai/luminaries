<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luminaries</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">Luminaries</h1>
            <span id="count" class="count hidden"></span>
        </header>

        <div class="search-bar">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search luminaries..." aria-label="Search luminaries">
        </div>

        <div id="luminary-list-container">
            <ul id="luminary-list" role="list"></ul>
            <p id="empty-state" class="hidden">No luminaries saved yet.<br>Highlight a name and right-click to research.</p>
            <p id="no-results" class="hidden">No matches found.</p>
        </div>

        <div class="footer">
            <button id="clear-all-btn" disabled aria-label="Clear all luminaries">Clear All</button>
            <button id="export-csv-btn" aria-label="Export luminaries to CSV">Export CSV</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
